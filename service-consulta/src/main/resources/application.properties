spring.application.name=service-consulta

server.port=8085
spring.datasource.url=jdbc:mysql://localhost:3306/db_consulta?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

springdoc.api-docs.path=/consulta-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.mvc.cors.allowed-origins=http://localhost:8081
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
springdoc.swagger-ui.operations-sorter=alpha
springdoc.server-url=http://localhost:8081