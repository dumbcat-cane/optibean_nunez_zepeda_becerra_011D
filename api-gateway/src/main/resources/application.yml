server:
  port: 8081

jwt:
  secret: "493358340235739058340598340598340598340598340598"

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      # --- CONFIGURACIÓN DE CORS GLOBAL ---
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

      routes:

        - id: cliente-service
          uri: http://localhost:8082
          predicates:
            - Path=/clientes/**

        - id: proveedor-service
          uri: http://localhost:8083
          predicates:
            - Path=/proveedor/**

        - id: inventario-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/**

        - id: consulta-service
          uri: http://localhost:8085
          predicates:
            - Path=/consultas/**

        - id: receta-service
          uri: http://localhost:8086
          predicates:
            - Path=/recetas/**

        - id: ventas-service
          uri: http://localhost:8087
          predicates:
            - Path=/ventas/**

        - id: estadisticas-service
          uri: http://localhost:8088
          predicates:
            - Path=/estadistica/**
          filters:
          - name: AuthenticationFilter

        - id: envio-service
          uri: http://localhost:8089
          predicates:
            - Path=/envio/**

        - id: medico-service
          uri: http://localhost:8090
          predicates:
            - Path=/medicos/**

        - id: garantia-service
          uri: http://localhost:8091
          predicates:
            - Path=/garantias/**
        #RUTA AUTHHHHHH
        - id: auth-service
          uri: http://localhost:8092
          predicates:
            - Path=/auth/**

        # Rutas doocccc

        - id: lentes-docs
          uri: http://localhost:8084
          predicates:
            - Path=/lentes-docs

        - id: receta-docs
          uri: http://localhost:8086
          predicates:
            - Path=/receta-docs

        - id: ventas-docs
          uri: http://localhost:8087
          predicates:
            - Path=/ventas-docs

        - id: estadisticas-docs
          uri: http://localhost:8088
          predicates:
            - Path=/estadisticas-docs

        - id: medicos-docs
          uri: http://localhost:8090
          predicates:
            - Path=/medicos-docs

        - id: garantia-docs
          uri: http://localhost:8091
          predicates:
            - Path=/garantia-docs
    



eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

springdoc:
  swagger-ui:
    urls:

      - name: Servicio Inventario
        url: /lentes-docs
      - name: Servicio Recetas
        url: /receta-docs
      - name: Servicio Ventas
        url: /ventas-docs
      - name: Servicio Medicos
        url: /medicos-docs
      - name: Servicio estadistica
        url: /estadisticas-docs
      - name: Servicio garantia
        url: /garantia-docs
logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG