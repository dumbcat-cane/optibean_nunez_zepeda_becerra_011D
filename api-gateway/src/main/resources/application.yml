server:
  port: 8081

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      # --- CONFIGURACIÓN DE CORS GLOBAL ---
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:8081"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

      routes:

        - id: cliente-service
          uri: http://localhost:8082
          predicates:
            - Path=/clientes/**

        - id: proveedor-service
          uri: http://localhost:8083
          predicates:
            - Path=/proveedor/**

        - id: inventario-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/**

        - id: consulta-service
          uri: http://localhost:8085
          predicates:
            - Path=/consultas/**

        - id: receta-service
          uri: http://localhost:8086
          predicates:
            - Path=/recetas/**

        - id: ventas-service
          uri: http://localhost:8087
          predicates:
            - Path=/ventas/**

        - id: estadisticas-service
          uri: http://localhost:8088
          predicates:
            - Path=/estadistica/**

        - id: envio-service
          uri: http://localhost:8089
          predicates:
            - Path=/envio/**

        - id: medico-service
          uri: http://localhost:8090
          predicates:
            - Path=/medicos/**

        - id: garantia-service
          uri: http://localhost:8091
          predicates:
            - Path=/garantias/**

        # Ruta para la documentación de Ventas
        - id: ventas-docs
          uri: http://localhost:8087
          predicates:
            - Path=/ventas-docs
        # Ruta para la documentación de Medicos
        - id: medicos-docs
          uri: http://localhost:8090
          predicates:
            - Path=/medicos-docs

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

springdoc:
  swagger-ui:
    urls:
      - name: Servicio Ventas
        url: /ventas-docs
      - name: Servicio Medicos
        url: /medicos-docs